<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYS.SNAKE // GLITCH</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            glitch: {
              cyan: '#0ff',
              magenta: '#f0f',
              dark: '#050505',
              gray: '#1a1a1a'
            }
          },
          fontFamily: {
            mono: ['"VT323"', 'monospace'],
          },
          boxShadow: {
            'glitch-cyan': '4px 4px 0px 0px theme("colors.glitch.cyan")',
            'glitch-magenta': '-4px -4px 0px 0px theme("colors.glitch.magenta")',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #000;
      color: #0ff;
      font-family: 'VT323', monospace;
      margin: 0;
      overflow: hidden;
      text-transform: uppercase;
    }

    /* CRT Scanlines Overlay */
    .scanlines::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50;
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
    }

    /* Glitch Text Effect */
    .glitch-text {
      position: relative;
      color: #fff;
      display: inline-block;
    }
    .glitch-text::before, .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
    .glitch-text::before {
      left: 3px;
      text-shadow: -2px 0 #f0f;
      clip: rect(44px, 450px, 56px, 0);
      animation: glitch-anim 3s infinite linear alternate-reverse;
    }
    .glitch-text::after {
      left: -3px;
      text-shadow: -2px 0 #0ff;
      clip: rect(44px, 450px, 56px, 0);
      animation: glitch-anim2 2.5s infinite linear alternate-reverse;
    }

    @keyframes glitch-anim {
      0% { clip: rect(12px, 9999px, 59px, 0); transform: translate(-2px, 2px); }
      5% { clip: rect(65px, 9999px, 13px, 0); transform: translate(2px, -2px); }
      10% { clip: rect(43px, 9999px, 8px, 0); transform: translate(-2px, 2px); }
      15% { clip: rect(89px, 9999px, 72px, 0); transform: translate(2px, -2px); }
      20% { clip: rect(12px, 9999px, 98px, 0); transform: translate(-2px, 2px); }
      25% { clip: rect(54px, 9999px, 23px, 0); transform: translate(2px, -2px); }
      30% { clip: rect(76px, 9999px, 45px, 0); transform: translate(-2px, 2px); }
      35% { clip: rect(21px, 9999px, 87px, 0); transform: translate(2px, -2px); }
      40% { clip: rect(98px, 9999px, 12px, 0); transform: translate(-2px, 2px); }
      45% { clip: rect(34px, 9999px, 65px, 0); transform: translate(2px, -2px); }
      50% { clip: rect(87px, 9999px, 34px, 0); transform: translate(-2px, 2px); }
      55% { clip: rect(12px, 9999px, 89px, 0); transform: translate(2px, -2px); }
      60% { clip: rect(65px, 9999px, 21px, 0); transform: translate(-2px, 2px); }
      65% { clip: rect(43px, 9999px, 76px, 0); transform: translate(2px, -2px); }
      70% { clip: rect(89px, 9999px, 54px, 0); transform: translate(-2px, 2px); }
      75% { clip: rect(23px, 9999px, 98px, 0); transform: translate(2px, -2px); }
      80% { clip: rect(76px, 9999px, 12px, 0); transform: translate(-2px, 2px); }
      85% { clip: rect(54px, 9999px, 65px, 0); transform: translate(2px, -2px); }
      90% { clip: rect(98px, 9999px, 43px, 0); transform: translate(-2px, 2px); }
      95% { clip: rect(12px, 9999px, 89px, 0); transform: translate(2px, -2px); }
      100% { clip: rect(65px, 9999px, 23px, 0); transform: translate(-2px, 2px); }
    }
    @keyframes glitch-anim2 {
      0% { clip: rect(65px, 9999px, 23px, 0); transform: translate(2px, -2px); }
      5% { clip: rect(12px, 9999px, 89px, 0); transform: translate(-2px, 2px); }
      10% { clip: rect(98px, 9999px, 43px, 0); transform: translate(2px, -2px); }
      15% { clip: rect(54px, 9999px, 65px, 0); transform: translate(-2px, 2px); }
      20% { clip: rect(76px, 9999px, 12px, 0); transform: translate(2px, -2px); }
      25% { clip: rect(23px, 9999px, 98px, 0); transform: translate(-2px, 2px); }
      30% { clip: rect(89px, 9999px, 54px, 0); transform: translate(2px, -2px); }
      35% { clip: rect(43px, 9999px, 76px, 0); transform: translate(-2px, 2px); }
      40% { clip: rect(65px, 9999px, 21px, 0); transform: translate(2px, -2px); }
      45% { clip: rect(12px, 9999px, 89px, 0); transform: translate(-2px, 2px); }
      50% { clip: rect(87px, 9999px, 34px, 0); transform: translate(2px, -2px); }
      55% { clip: rect(34px, 9999px, 65px, 0); transform: translate(-2px, 2px); }
      60% { clip: rect(98px, 9999px, 12px, 0); transform: translate(2px, -2px); }
      65% { clip: rect(21px, 9999px, 87px, 0); transform: translate(-2px, 2px); }
      70% { clip: rect(76px, 9999px, 45px, 0); transform: translate(2px, -2px); }
      75% { clip: rect(54px, 9999px, 23px, 0); transform: translate(-2px, 2px); }
      80% { clip: rect(12px, 9999px, 98px, 0); transform: translate(2px, -2px); }
      85% { clip: rect(89px, 9999px, 72px, 0); transform: translate(-2px, 2px); }
      90% { clip: rect(43px, 9999px, 8px, 0); transform: translate(2px, -2px); }
      95% { clip: rect(65px, 9999px, 13px, 0); transform: translate(-2px, 2px); }
      100% { clip: rect(12px, 9999px, 59px, 0); transform: translate(2px, -2px); }
    }

    .screen-tear {
      animation: tear 4s infinite;
    }
    @keyframes tear {
      0%, 95% { transform: translateX(0); }
      96% { transform: translateX(15px) skewX(10deg); }
      97% { transform: translateX(-15px) skewX(-10deg); }
      98% { transform: translateX(5px); }
      99% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    
    .flicker {
      animation: flicker-anim 0.15s infinite;
    }
    @keyframes flicker-anim {
      0% { opacity: 0.9; }
      50% { opacity: 1; }
      100% { opacity: 0.8; }
    }
  </style>
  </head>
<body class="scanlines">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
